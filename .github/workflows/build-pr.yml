name: Build PR
on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      alpine: ${{ steps.filter.outputs.alpine }}
      debian: ${{ steps.filter.outputs.debian }}
    steps:
      # On pull_request events paths-filter lists changed files via the API,
      # so no checkout is required here.
      - name: Detect changed variants
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            shared: &shared
              - '.github/actions/build/**'
              - '.github/workflows/build-pr.yml'
              - 'tests/**'
            alpine:
              - *shared
              - 'alpine/**'
            debian:
              - *shared
              - 'debian/**'
  build-alpine:
    needs: changes
    if: ${{ needs.changes.outputs.alpine == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Build Docker image
        uses: ./.github/actions/build/
        with:
          context: ./alpine/
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/texlive-ja-textlint:alpine
      - name: Test
        run: |
          # Create test directory with proper permissions for node user
          mkdir -p ${GITHUB_WORKSPACE}/test-run
          cp -r tests/* ${GITHUB_WORKSPACE}/test-run/
          chmod -R 777 ${GITHUB_WORKSPACE}/test-run
          
          docker run --rm -v ${GITHUB_WORKSPACE}/test-run:/workdir \
            ghcr.io/${{ github.repository_owner }}/texlive-ja-textlint:alpine \
            sh -c 'latexmk -C main.tex && latexmk main.tex && latexmk -c main.tex';
      - name: Upload result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alpine
          path: ./test-run/main.pdf
  build-debian:
    needs: changes
    if: ${{ needs.changes.outputs.debian == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Build Docker image
        uses: ./.github/actions/build/
        with:
          context: ./debian/
          platforms: linux/amd64
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/texlive-ja-textlint:debian
      - name: Test
        run: |
          # Create test directory with proper permissions for node user
          mkdir -p ${GITHUB_WORKSPACE}/test-run
          cp -r tests/* ${GITHUB_WORKSPACE}/test-run/
          chmod -R 777 ${GITHUB_WORKSPACE}/test-run
          
          docker run --rm -v ${GITHUB_WORKSPACE}/test-run:/workdir \
            ghcr.io/${{ github.repository_owner }}/texlive-ja-textlint:debian \
            sh -c 'latexmk -C main.tex && latexmk main.tex && latexmk -c main.tex';
      - name: Upload result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debian
          path: ./test-run/main.pdf
  build-debian-arm64:
    needs: changes
    if: ${{ needs.changes.outputs.debian == 'true' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Build Docker image
        uses: ./.github/actions/build/
        with:
          context: ./debian/
          platforms: linux/arm64
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/texlive-ja-textlint:debian-arm64
      - name: Test
        run: |
          # Create test directory with proper permissions for node user
          mkdir -p ${GITHUB_WORKSPACE}/test-run
          cp -r tests/* ${GITHUB_WORKSPACE}/test-run/
          chmod -R 777 ${GITHUB_WORKSPACE}/test-run
          
          docker run --rm -v ${GITHUB_WORKSPACE}/test-run:/workdir \
            ghcr.io/${{ github.repository_owner }}/texlive-ja-textlint:debian-arm64 \
            sh -c 'latexmk -C main.tex && latexmk main.tex && latexmk -c main.tex';
      - name: Upload result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debian-arm64
          path: ./test-run/main.pdf
